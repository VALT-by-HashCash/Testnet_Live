name: CI
on:
  push:
    branches: [master]
jobs:
  release-master:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2
      - name: Move FE folder
        run: mv frontend backend/
      - name: Push to Heroku
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_app_name: "hashcashfullstack"
          heroku_email: "zacwickstrom@gmail.com"
          appdir: "backend"
